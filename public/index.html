<!doctype html>

<meta charset="utf-8" />

<title>ProofSource — the settlement floor for AI-cited knowledge</title>
<!--
  ProofSource redesign · "The Settlement Floor"
  ------------------------------------------------------------------
  DIRECTION (decided): elevate the dark/editorial brand into a live,
  production-grade settlement terminal. Sacred motif kept: the glow + blueprint
  grid canvas. Carried forward because they're load-bearing for the product:
  the five decision colors (semantic), the paper receipt (signature), Fraunces
  editorial serif, JetBrains Mono ledger figures.
  WHAT'S NEW vs the original standalone:
   · a persistent live settlement TICKER (citations → payments, streaming)
   · animated COUNTERS (paid to creators, payments/min, avg sub-cent)
   · a two-column hero: editorial statement (L) + live settlement MONITOR (R)
   · an interactive DEMO where a question lights up the pipeline node-by-node
     and a receipt PRINTS + tears off
   · balanced creator/operator doors, a lit "how it works" rail
  Consumes the ProofSource design system (../styles.css tokens). Interactive,
  lively motion, clickable. Single-file-per-concern React (Babel) prototype.
-->
<link rel="stylesheet" href="./styles.css" />
<style>
  html,body{margin:0;min-height:100%}
  body{
    background:var(--canvas);background-attachment:fixed;
    color:var(--text);font-family:var(--font-sans);font-size:14px;letter-spacing:-.005em;
  }
  /* sacred motif: blueprint grid over the glow canvas */
  body:before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.12;
    background-image:var(--grid-image);background-size:var(--grid-size);
    -webkit-mask-image:var(--grid-mask);mask-image:var(--grid-mask)}
  #root{position:relative;z-index:1}
  a{color:inherit;text-decoration:none}
  ::selection{background:rgba(91,192,235,.28)}
  mark{background:rgba(84,180,136,.16);color:#DDFBE9;border-bottom:1px solid rgba(84,180,136,.45);padding:1px 4px;border-radius:4px}

  /* scrollbar */
  *::-webkit-scrollbar{width:11px;height:11px}
  *::-webkit-scrollbar-thumb{background:#1d2738;border:3px solid transparent;background-clip:padding-box;border-radius:99px}
  *::-webkit-scrollbar-thumb:hover{background:#2a3854;background-clip:padding-box}

  /* page enter — opacity-safe (never traps content hidden) */
  .page{animation:pageIn .45s var(--ease)}
  @keyframes pageIn{from{transform:translateY(8px)}to{transform:none}}

  /* app-mode: flat dark background, no glow/grid — sidebar handles its own bg */
  .app-mode{background:#080C12 !important;background-attachment:initial !important}
  .app-mode:before{display:none !important}
  #boot{position:fixed;inset:0;display:grid;place-items:center;z-index:2;color:var(--faint);font-family:var(--font-mono);font-size:12px;letter-spacing:.1em}
  #boot .b{display:flex;align-items:center;gap:9px}
  #boot .d{width:8px;height:8px;border-radius:99px;background:var(--earned);box-shadow:var(--glow-earned);animation:bp 1.3s infinite}
  @keyframes bp{0%,100%{opacity:1}50%{opacity:.3}}

  /* ---------- responsive ---------- */
  @media(max-width:1080px){
    .hero-grid{grid-template-columns:1fr !important;gap:32px !important}
    .demo-layout{grid-template-columns:1fr !important}
    .demo-mandate,.demo-proof{position:static !important}
    .dev-grid,.proof-grid{grid-template-columns:1fr !important;gap:28px !important}
    .integ-grid{grid-template-columns:1fr !important;gap:18px !important}
  }
  @media(max-width:820px){
    .metrics-grid{grid-template-columns:1fr 1fr !important;gap:22px !important}
    .doors-grid,.sol-doors,.use-grid,.how-grid{grid-template-columns:1fr !important}
    .how-rail{display:none !important}
    .footer-grid{grid-template-columns:1fr 1fr !important;gap:24px !important}
    .nav-links{display:none !important}
    .ep-row{grid-template-columns:60px 1fr !important}
    .ep-row span:last-child{grid-column:1 / -1}
  }
  @media(max-width:560px){
    .metrics-grid{grid-template-columns:1fr 1fr !important}
    .footer-grid{grid-template-columns:1fr !important}
    .nav-signin{display:none !important}
  }
</style>
</head>
<body>
